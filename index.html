<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECTION 05 開合跳地獄</title>
    <style>
        :root {
            --ink: #1A1F3A;
            --coral: #F96167;
            --sun: #F9E795;
            --cream: #FFF5F1;
            --sand: #E5DDD5;
            --muted: #6B6E7B;
            --deep: #2F3C7E;
            --white: #FFFFFF;
            --up: #F9E795;
            --down: #F96167;
            --idle: #E5DDD5;
            --shadow: 0 24px 60px rgba(26, 31, 58, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            color: var(--ink);
            font-family: Calibri, "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            background:
                linear-gradient(135deg, rgba(249, 97, 103, 0.13), transparent 32%),
                linear-gradient(315deg, rgba(249, 231, 149, 0.52), transparent 38%),
                var(--cream);
        }

        button,
        input {
            font: inherit;
        }

        .page {
            width: min(1180px, calc(100% - 32px));
            height: 100vh;
            height: 100dvh;
            margin: 0 auto;
            padding: clamp(12px, 2.6vh, 28px) 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            gap: clamp(10px, 2vh, 22px);
            overflow: hidden;
        }

        .hero {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: clamp(10px, 1.7vw, 18px);
            align-items: end;
            border-bottom: 3px solid var(--ink);
            padding-bottom: clamp(8px, 1.6vh, 18px);
            min-height: 0;
        }

        .eyebrow {
            color: var(--coral);
            font-size: clamp(0.7rem, 1.5vh, 0.84rem);
            font-weight: 800;
            letter-spacing: 0;
            margin: 0 0 clamp(3px, 0.7vh, 8px);
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(1.8rem, 4.4vw, 5.3rem);
            line-height: 0.92;
            margin: 0;
            max-width: 760px;
        }

        .hero-note {
            max-width: 300px;
            color: var(--muted);
            font-size: clamp(0.82rem, 1.7vh, 1rem);
            line-height: 1.35;
            text-align: right;
        }

        .stage {
            display: grid;
            grid-template-columns: minmax(320px, 1.25fr) minmax(300px, 0.75fr);
            gap: clamp(10px, 2vw, 22px);
            align-items: stretch;
            min-height: 0;
            overflow: hidden;
        }

        .camera-panel,
        .control-panel {
            border: 3px solid var(--ink);
            background: rgba(255, 255, 255, 0.86);
            box-shadow: var(--shadow);
        }

        .camera-panel {
            position: relative;
            min-height: 0;
            padding: clamp(10px, 1.7vw, 18px);
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: clamp(8px, 1.5vh, 16px);
            overflow: hidden;
        }

        .panel-bar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 34px;
            border: 2px solid var(--ink);
            background: var(--sun);
            color: var(--ink);
            font-size: 0.88rem;
            font-weight: 800;
            padding: 5px 10px;
        }

        .status {
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 700;
            text-align: right;
        }

        .canvas-shell {
            position: relative;
            display: grid;
            place-items: center;
            overflow: hidden;
            min-height: 0;
            background:
                linear-gradient(90deg, rgba(26, 31, 58, 0.08) 1px, transparent 1px),
                linear-gradient(0deg, rgba(26, 31, 58, 0.08) 1px, transparent 1px),
                var(--ink);
            background-size: 28px 28px;
        }

        #canvas {
            width: min(100%, 520px);
            max-height: 100%;
            aspect-ratio: 1;
            border: 4px solid var(--white);
            background: #111528;
            object-fit: contain;
        }

        .loading-cover {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--white);
            text-align: center;
            background: rgba(26, 31, 58, 0.88);
            transition: opacity 180ms ease, visibility 180ms ease;
        }

        .loading-cover.is-hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-title {
            margin: 0 0 10px;
            color: var(--sun);
            font-size: 1.75rem;
            font-weight: 900;
        }

        .loading-copy {
            margin: 0;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }

        .prediction-list {
            display: grid;
            gap: clamp(4px, 0.8vh, 8px);
            min-height: 0;
        }

        .prediction-row {
            display: grid;
            grid-template-columns: 76px 1fr 48px;
            gap: 10px;
            align-items: center;
            color: var(--muted);
            font-size: clamp(0.78rem, 1.6vh, 0.95rem);
            font-weight: 700;
        }

        .meter {
            height: 10px;
            border: 2px solid var(--ink);
            background: var(--cream);
        }

        .meter-fill {
            width: 0%;
            height: 100%;
            background: var(--coral);
            transition: width 120ms ease;
        }

        .control-panel {
            padding: clamp(12px, 2vw, 22px);
            display: grid;
            gap: clamp(8px, 1.6vh, 18px);
            align-content: stretch;
            grid-template-rows: auto auto auto minmax(0, auto);
            overflow: hidden;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .metric {
            min-height: clamp(82px, 15vh, 128px);
            border: 3px solid var(--ink);
            background: var(--cream);
            padding: clamp(8px, 1.5vw, 14px);
            display: grid;
            align-content: space-between;
        }

        .metric.primary {
            grid-column: span 2;
            background: var(--ink);
            color: var(--white);
        }

        .metric-label {
            color: inherit;
            font-size: clamp(0.72rem, 1.5vh, 0.9rem);
            font-weight: 800;
        }

        .metric-value {
            font-size: clamp(1.8rem, 6vw, 4.6rem);
            line-height: 0.95;
            font-weight: 900;
        }

        .metric.primary .metric-value {
            color: var(--sun);
        }

        .pose-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            width: 100%;
            border: 3px solid var(--ink);
            background: var(--idle);
            color: var(--ink);
            font-size: clamp(0.9rem, 2vh, 1.1rem);
            font-weight: 900;
        }

        .pose-pill.up {
            background: var(--up);
        }

        .pose-pill.down {
            background: var(--down);
            color: var(--white);
        }

        .timer-form {
            display: grid;
            gap: 8px;
        }

        label {
            color: var(--muted);
            font-size: 0.92rem;
            font-weight: 800;
        }

        .duration-control {
            display: grid;
            grid-template-columns: 1fr auto;
            border: 3px solid var(--ink);
            background: var(--white);
        }

        #durationInput {
            min-width: 0;
            border: 0;
            background: transparent;
            color: var(--ink);
            font-size: clamp(1rem, 2.6vh, 1.45rem);
            font-weight: 900;
            padding: clamp(7px, 1.5vh, 12px);
            outline: none;
        }

        .seconds-label {
            display: grid;
            place-items: center;
            min-width: 56px;
            background: var(--sand);
            color: var(--muted);
            font-weight: 900;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .action {
            min-height: clamp(40px, 7vh, 54px);
            border: 3px solid var(--ink);
            color: var(--ink);
            background: var(--white);
            font-size: clamp(0.88rem, 1.9vh, 1rem);
            font-weight: 900;
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
        }

        .action:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 0 rgba(26, 31, 58, 0.16);
        }

        .action:disabled {
            cursor: not-allowed;
            opacity: 0.48;
        }

        .action.primary {
            grid-column: span 2;
            background: var(--coral);
            color: var(--white);
        }

        .action.pause {
            background: var(--sun);
        }

        .action.reset {
            background: var(--sand);
        }

        .rule-list {
            margin: 0;
            padding: 14px 16px;
            border-left: 8px solid var(--coral);
            background: var(--cream);
            color: var(--muted);
            font-size: clamp(0.78rem, 1.6vh, 0.96rem);
            line-height: 1.3;
        }

        .rule-list strong {
            color: var(--ink);
        }

        @media (max-width: 900px) {
            .stage {
                grid-template-columns: 1fr;
                grid-template-rows: minmax(0, 1fr) auto;
            }

            .hero {
                grid-template-columns: 1fr auto;
            }

            .hero-note {
                max-width: 260px;
            }

            .scoreboard {
                grid-template-columns: 1.2fr 0.9fr 0.9fr;
            }

            .metric.primary {
                grid-column: auto;
            }

            .metric {
                min-height: clamp(70px, 11vh, 96px);
            }

            .control-panel {
                grid-template-columns: 1.15fr 0.85fr;
                grid-template-rows: auto auto;
            }

            .scoreboard {
                grid-column: span 2;
            }

            .timer-form,
            .controls {
                align-self: stretch;
            }

            .rule-list {
                grid-column: span 2;
                padding: 8px 10px;
                border-left-width: 6px;
            }
        }

        @media (max-width: 560px) {
            .page {
                width: min(100% - 12px, 1180px);
                padding: 8px 0;
                gap: 7px;
            }

            .hero {
                grid-template-columns: 1fr;
                gap: 4px;
                padding-bottom: 7px;
            }

            .hero-note {
                max-width: none;
                margin: 0;
                text-align: left;
            }

            .eyebrow {
                display: none;
            }

            h1 {
                font-size: clamp(1.35rem, 7.2vw, 2rem);
                line-height: 0.98;
            }

            .stage {
                gap: 7px;
                grid-template-rows: minmax(0, 1fr) auto;
            }

            .camera-panel {
                padding: 7px;
                gap: 6px;
                border-width: 2px;
            }

            .panel-bar {
                grid-template-columns: 1fr;
                display: grid;
                gap: 4px;
            }

            .tag {
                min-height: 24px;
                width: max-content;
                max-width: 100%;
                padding: 2px 6px;
                border-width: 2px;
                font-size: 0.68rem;
            }

            .status {
                text-align: left;
                font-size: 0.72rem;
            }

            #canvas {
                border-width: 2px;
            }

            .prediction-row {
                grid-template-columns: 48px 1fr 34px;
                gap: 5px;
                font-size: 0.68rem;
            }

            .meter {
                height: 7px;
                border-width: 1px;
            }

            .control-panel {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
                padding: 8px;
                gap: 7px;
                border-width: 2px;
            }

            .scoreboard {
                grid-column: auto;
                grid-template-columns: 1fr 0.78fr 1fr;
                gap: 6px;
            }

            .metric {
                min-height: 58px;
                padding: 6px;
                border-width: 2px;
            }

            .metric.primary {
                grid-column: auto;
            }

            .metric-value {
                font-size: clamp(1.25rem, 7vw, 1.85rem);
            }

            .pose-pill {
                min-height: 27px;
                border-width: 2px;
                font-size: 0.72rem;
            }

            .timer-form {
                gap: 4px;
            }

            label {
                font-size: 0.68rem;
            }

            .duration-control,
            .action {
                border-width: 2px;
            }

            #durationInput {
                padding: 5px 8px;
                font-size: 0.95rem;
            }

            .seconds-label {
                min-width: 40px;
                font-size: 0.78rem;
            }

            .controls {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 6px;
            }

            .rule-list {
                grid-column: auto;
                padding: 6px 8px;
                border-left-width: 4px;
                font-size: 0.66rem;
                line-height: 1.18;
            }

            .action,
            .action.primary {
                grid-column: auto;
                min-height: 34px;
                font-size: 0.78rem;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="hero">
            <div>
                <p class="eyebrow">Powered by Teachable Machine</p>
                <h1>SECTION 05 開合跳地獄</h1>
            </div>
            <p class="hero-note">16:15 — 16:30 動手做 AI III。頁面會先準備模型與攝影機，按下開始後才倒數與計次。</p>
        </header>

        <section class="stage" aria-label="開合跳互動區">
            <section class="camera-panel" aria-label="攝影機與骨架">
                <div class="panel-bar">
                    <span class="tag">SECTION 05 / 動手做 AI III</span>
                    <span class="status" id="statusText">模型載入中...</span>
                </div>

                <div class="canvas-shell">
                    <canvas id="canvas" width="480" height="480"></canvas>
                    <div class="loading-cover" id="loadingCover">
                        <div>
                            <p class="loading-title">攝影機準備中</p>
                            <p class="loading-copy">請允許瀏覽器使用 webcam，AI 訓練師正在就位。</p>
                        </div>
                    </div>
                </div>

                <div class="prediction-list" id="label-container" aria-label="模型辨識信心值"></div>
            </section>

            <aside class="control-panel" aria-label="挑戰控制面板">
                <div class="scoreboard">
                    <div class="metric primary">
                        <span class="metric-label">剩餘時間</span>
                        <span class="metric-value" id="timeDisplay">00:30</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">開合跳</span>
                        <span class="metric-value" id="countDisplay">0</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">目前姿勢</span>
                        <span class="pose-pill" id="poseDisplay">待機</span>
                    </div>
                </div>

                <div class="timer-form">
                    <label for="durationInput">倒數秒數</label>
                    <div class="duration-control">
                        <input id="durationInput" type="number" min="5" max="300" step="5" value="30">
                        <span class="seconds-label">秒</span>
                    </div>
                </div>

                <div class="controls">
                    <button class="action primary" id="startButton" type="button" disabled>開始</button>
                    <button class="action pause" id="pauseButton" type="button" disabled>暫停</button>
                    <button class="action reset" id="resetButton" type="button">重置</button>
                </div>

                <p class="rule-list">
                    <strong>任務規則：</strong>手腕高過肩膀 = 開；回到腰線 = 合。一開一合 = 1 次。
                </p>
            </aside>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <script src="./pose-rules.js"></script>
    <script>
        const MODEL_URL = "./model/";
        const MIN_CLASS_CONFIDENCE = 0.75;
        const MIN_PART_CONFIDENCE = 0.5;
        const CANVAS_SIZE = 480;
        const POSE_LABELS = ["開", "合"];
        const POSE_STATE_BY_LABEL = new Map([
            ["開", "up"],
            ["合", "down"],
            ["up", "up"],
            ["down", "down"]
        ]);
        const {
            classifyPoseGeometry,
            combinePoseState,
            createPoseStabilizer
        } = window.PoseRules;
        const stabilizePoseState = createPoseStabilizer(2);

        let model;
        let webcam;
        let ctx;
        let maxPredictions = 0;
        let remainingMs = 30000;
        let lastTick = 0;
        let count = 0;
        let previousCountingPose = null;
        let currentPoseState = null;
        let currentPoseConfidence = 0;
        let audioContext;

        const state = {
            ready: false,
            running: false,
            finished: false
        };

        const elements = {};

        window.addEventListener("DOMContentLoaded", () => {
            bindElements();
            attachEvents();
            resetSession();
            initializeTrainer();
        });

        function bindElements() {
            elements.canvas = document.getElementById("canvas");
            elements.loadingCover = document.getElementById("loadingCover");
            elements.statusText = document.getElementById("statusText");
            elements.labelContainer = document.getElementById("label-container");
            elements.timeDisplay = document.getElementById("timeDisplay");
            elements.countDisplay = document.getElementById("countDisplay");
            elements.poseDisplay = document.getElementById("poseDisplay");
            elements.durationInput = document.getElementById("durationInput");
            elements.startButton = document.getElementById("startButton");
            elements.pauseButton = document.getElementById("pauseButton");
            elements.resetButton = document.getElementById("resetButton");
            ctx = elements.canvas.getContext("2d");
        }

        function attachEvents() {
            elements.startButton.addEventListener("click", startChallenge);
            elements.pauseButton.addEventListener("click", pauseChallenge);
            elements.resetButton.addEventListener("click", resetSession);
            elements.durationInput.addEventListener("input", () => {
                if (!state.running && !state.finished) {
                    remainingMs = getDurationSeconds() * 1000;
                    updateTimeDisplay();
                }
            });
        }

        async function initializeTrainer() {
            try {
                setStatus("模型載入中...");
                const modelVersion = new URLSearchParams(window.location.search).get("model");
                const versionQuery = modelVersion ? `?v=${encodeURIComponent(modelVersion)}` : "";
                const modelURL = MODEL_URL + "model.json" + versionQuery;
                const metadataURL = MODEL_URL + "metadata.json" + versionQuery;
                model = await tmPose.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                createPredictionRows();

                setStatus("攝影機準備中...");
                webcam = new tmPose.Webcam(CANVAS_SIZE, CANVAS_SIZE, true);
                await webcam.setup();
                await webcam.play();

                state.ready = true;
                elements.loadingCover.classList.add("is-hidden");
                setStatus("準備完成，請按開始");
                updateControls();
                window.requestAnimationFrame(loop);
            } catch (error) {
                console.error(error);
                setStatus("初始化失敗，請重新整理並允許攝影機");
                elements.loadingCover.querySelector(".loading-title").textContent = "無法啟動攝影機";
                elements.loadingCover.querySelector(".loading-copy").textContent = "請確認瀏覽器允許 webcam，並使用 localhost 或 HTTPS 開啟頁面。";
            }
        }

        async function loop(timestamp) {
            if (webcam) {
                webcam.update();
                await predict();
            }

            updateTimer(timestamp);
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);
            const topPrediction = getTopPrediction(prediction);
            const modelPoseState = normalizePoseLabel(topPrediction.className);
            const geometryPoseState = classifyPoseGeometry(pose?.keypoints, MIN_PART_CONFIDENCE);
            const combinedPoseState = combinePoseState(
                modelPoseState,
                topPrediction.probability,
                geometryPoseState,
                MIN_CLASS_CONFIDENCE
            );
            const stabilizedPoseState = stabilizePoseState(combinedPoseState);
            if (stabilizedPoseState && stabilizedPoseState === combinedPoseState) {
                currentPoseConfidence = topPrediction.probability;
            }
            currentPoseState = stabilizedPoseState;

            updatePredictionRows(prediction);
            updatePoseDisplay();

            if (state.running && currentPoseState) {
                updateJumpCounter(currentPoseState);
            }

            drawPose(pose);
        }

        function getTopPrediction(prediction) {
            return prediction.reduce((best, item) => {
                return item.probability > best.probability ? item : best;
            }, prediction[0]);
        }

        function normalizePoseLabel(className) {
            if (typeof className !== "string") {
                return null;
            }
            return POSE_STATE_BY_LABEL.get(className.trim().toLowerCase()) ?? null;
        }

        function getPoseDisplayLabel(className) {
            const poseState = normalizePoseLabel(className);
            if (poseState === "up") {
                return POSE_LABELS[0];
            }
            if (poseState === "down") {
                return POSE_LABELS[1];
            }
            return className;
        }

        function updateJumpCounter(poseState) {
            if (previousCountingPose === "up" && poseState === "down") {
                count += 1;
                elements.countDisplay.textContent = String(count);
            }
            previousCountingPose = poseState;
        }

        function startChallenge() {
            if (!state.ready) {
                return;
            }

            if (state.finished || remainingMs <= 0) {
                resetSession();
            }

            state.running = true;
            state.finished = false;
            lastTick = performance.now();
            ensureAudioContext();
            setStatus("挑戰進行中");
            updateControls();
        }

        function pauseChallenge() {
            if (!state.running) {
                return;
            }

            state.running = false;
            setStatus("已暫停，可調整站位");
            updateControls();
        }

        function resetSession() {
            state.running = false;
            state.finished = false;
            remainingMs = getDurationSeconds() * 1000;
            lastTick = 0;
            count = 0;
            previousCountingPose = null;
            elements.countDisplay.textContent = "0";
            setStatus(state.ready ? "準備完成，請按開始" : "模型載入中...");
            updateTimeDisplay();
            updatePoseDisplay();
            updateControls();
        }

        function updateTimer(timestamp) {
            if (!state.running) {
                return;
            }

            if (!lastTick) {
                lastTick = timestamp;
                return;
            }

            const elapsed = timestamp - lastTick;
            lastTick = timestamp;
            remainingMs = Math.max(0, remainingMs - elapsed);
            updateTimeDisplay();

            if (remainingMs <= 0) {
                finishChallenge();
            }
        }

        function finishChallenge() {
            state.running = false;
            state.finished = true;
            previousCountingPose = null;
            setStatus("時間到，挑戰完成");
            ringBell();
            updateControls();
        }

        function getDurationSeconds() {
            const value = Number.parseInt(elements.durationInput.value, 10);
            if (Number.isNaN(value)) {
                return 30;
            }
            return Math.min(300, Math.max(5, value));
        }

        function updateTimeDisplay() {
            const totalSeconds = Math.ceil(remainingMs / 1000);
            const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
            const seconds = String(totalSeconds % 60).padStart(2, "0");
            elements.timeDisplay.textContent = `${minutes}:${seconds}`;
        }

        function updateControls() {
            elements.startButton.disabled = !state.ready || state.running;
            elements.pauseButton.disabled = !state.ready || !state.running;
            elements.durationInput.disabled = state.running || state.finished;
            if (state.finished) {
                elements.startButton.textContent = "再挑戰一次";
            } else if (remainingMs < getDurationSeconds() * 1000) {
                elements.startButton.textContent = "繼續";
            } else {
                elements.startButton.textContent = "開始";
            }
        }

        function updatePoseDisplay() {
            elements.poseDisplay.className = "pose-pill";
            if (currentPoseState === "up") {
                elements.poseDisplay.textContent = `開 ${Math.round(currentPoseConfidence * 100)}%`;
                elements.poseDisplay.classList.add("up");
                return;
            }
            if (currentPoseState === "down") {
                elements.poseDisplay.textContent = `合 ${Math.round(currentPoseConfidence * 100)}%`;
                elements.poseDisplay.classList.add("down");
                return;
            }
            elements.poseDisplay.textContent = state.ready ? "辨識中" : "待機";
        }

        function createPredictionRows() {
            elements.labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i += 1) {
                const row = document.createElement("div");
                row.className = "prediction-row";
                row.innerHTML = `
                    <span class="prediction-name">${POSE_LABELS[i] ?? ""}</span>
                    <span class="meter"><span class="meter-fill"></span></span>
                    <span class="prediction-score">0%</span>
                `;
                elements.labelContainer.appendChild(row);
            }
        }

        function updatePredictionRows(prediction) {
            prediction.forEach((item, index) => {
                const row = elements.labelContainer.children[index];
                if (!row) {
                    return;
                }

                row.querySelector(".prediction-name").textContent = getPoseDisplayLabel(item.className);
                row.querySelector(".meter-fill").style.width = `${Math.round(item.probability * 100)}%`;
                row.querySelector(".prediction-score").textContent = `${Math.round(item.probability * 100)}%`;
            });
        }

        function drawPose(pose) {
            if (!webcam || !webcam.canvas) {
                return;
            }

            ctx.drawImage(webcam.canvas, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
            if (!pose) {
                return;
            }

            const colors = getPoseColors();
            tmPose.drawKeypoints(pose.keypoints, MIN_PART_CONFIDENCE, ctx, 7, colors.fill, colors.stroke);
            tmPose.drawSkeleton(pose.keypoints, MIN_PART_CONFIDENCE, ctx, 5, colors.stroke);
        }

        function getPoseColors() {
            if (currentPoseState === "up") {
                return { fill: "#F9E795", stroke: "#F9E795" };
            }
            if (currentPoseState === "down") {
                return { fill: "#F96167", stroke: "#F96167" };
            }
            return { fill: "#E5DDD5", stroke: "#FFFFFF" };
        }

        function setStatus(message) {
            elements.statusText.textContent = message;
        }

        function ringBell() {
            if (!ensureAudioContext()) {
                return;
            }

            const now = audioContext.currentTime;
            [880, 1175].forEach((frequency, index) => {
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();
                oscillator.type = "sine";
                oscillator.frequency.value = frequency;
                gain.gain.setValueAtTime(0.001, now + index * 0.18);
                gain.gain.exponentialRampToValueAtTime(0.28, now + index * 0.18 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.18 + 0.16);
                oscillator.connect(gain);
                gain.connect(audioContext.destination);
                oscillator.start(now + index * 0.18);
                oscillator.stop(now + index * 0.18 + 0.17);
            });
        }

        function ensureAudioContext() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) {
                return false;
            }

            if (!audioContext) {
                audioContext = new AudioContext();
            }

            if (audioContext.state === "suspended") {
                audioContext.resume();
            }

            return true;
        }
    </script>
</body>
</html>
